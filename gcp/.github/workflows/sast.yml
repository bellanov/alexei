# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: SAST Scan with Checkov

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install checkov
    - name: Scan with Checkov
      run: |
        # Run Checkov to scan the codebase for security issues
        checkov --download-external-modules true --directory . --output json > checkov_report.json || true

        # Upload the report as an artifact if needed
        echo "Checkov report generated at checkov_report.json"
